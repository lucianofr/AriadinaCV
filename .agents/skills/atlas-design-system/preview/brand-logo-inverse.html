<head>

<title>Logo inverse</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="padding:0;">

    <div style="position:absolute; inset:0; background:radial-gradient(ellipse at 70% 30%, rgba(63,184,214,0.18) 0%, transparent 50%);"></div>
