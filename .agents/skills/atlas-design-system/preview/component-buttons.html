<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style>
  .btn { font-family: var(--font-sans); font-size:14px; font-weight:600; padding:11px 20px; border-radius:10px; border:1px solid transparent; cursor:pointer; display:inline-flex; align-items:center; gap:8px; line-height:1; transition: all 160ms var(--ease-out); }
  .btn-primary { background:var(--blue-700); color:#FFF; }
  .btn-primary:hover { background:var(--blue-600); }
  .btn-secondary { background:transparent; color:var(--navy-800); border-color:var(--slate-300); }
  .btn-secondary:hover { background:var(--slate-050); border-color:var(--navy-800); }
  .btn-whatsapp { background:var(--teal-600); color:#FFF; }
  .btn-whatsapp:hover { background:var(--teal-700); }
  .btn-ghost { background:transparent; color:var(--navy-800); }
  .btn-ghost:hover { background:var(--slate-100); }
  .btn-dark { background:var(--navy-800); color:#FFF; }
  .btn-dark:hover { background:var(--navy-700); }
  .btn-sm { padding:7px 14px; font-size:13px; border-radius:8px; }
  .btn-lg { padding:14px 26px; font-size:15px; border-radius:12px; }
</style>
</head>
<body>
<div class="card">
  <div class="label-row">
    <span class="tag">Buttons · 5 variantes · 3 tamanhos</span>
    <span class="tag-spec">radius 10 · weight 600</span>
  </div>
  <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
    <button class="btn btn-primary">Falar pelo WhatsApp →</button>
    <button class="btn btn-secondary">LinkedIn</button>
    <button class="btn btn-whatsapp">Enviar mensagem</button>
    <button class="btn btn-dark">Baixar currículo</button>
    <button class="btn btn-ghost">Cancelar</button>
  </div>
  <div style="display:flex; gap:10px; align-items:center;">
    <button class="btn btn-primary btn-sm">Pequeno</button>
    <button class="btn btn-primary">Padrão</button>
    <button class="btn btn-primary btn-lg">Grande</button>
  </div>
  <div style="display:flex; gap:10px; align-items:center;">
    <button class="btn btn-primary" disabled style="opacity:0.4; cursor:not-allowed;">Disabled</button>
    <button class="btn btn-primary" style="background:var(--blue-800); box-shadow:0 0 0 3px rgba(63, 184, 214, 0.32);">Focused</button>
    <button class="btn btn-secondary" style="background:var(--slate-050); border-color:var(--navy-800);">Hover</button>
  </div>
</div>
</body>
</html>
