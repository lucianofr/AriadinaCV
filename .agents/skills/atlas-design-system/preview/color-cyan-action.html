<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cyan & Action scale</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="label-row">
    <span class="tag">Accent · Cyan/Teal</span>
    <span class="tag-spec">glow do globo · highlights</span>
  </div>
  <div class="row">
    <div class="swatch" style="background:#0E3D4A; color:#E5F6FA;"><span class="name">900</span><span class="hex">#0E3D4A</span></div>
    <div class="swatch" style="background:#155B6E; color:#E5F6FA;"><span class="name">800</span><span class="hex">#155B6E</span></div>
    <div class="swatch" style="background:#1B7A92; color:#E5F6FA;"><span class="name">700</span><span class="hex">#1B7A92</span></div>
    <div class="swatch" style="background:#2299B5; color:#E5F6FA;"><span class="name">600</span><span class="hex">#2299B5</span></div>
    <div class="swatch" style="background:#3FB8D6; outline:2px solid #0D2747; outline-offset:-2px;"><span class="name">500 ◆</span><span class="hex">#3FB8D6</span></div>
    <div class="swatch" style="background:#6FCEE3;"><span class="name">400</span><span class="hex">#6FCEE3</span></div>
    <div class="swatch" style="background:#9FDEEC;"><span class="name">300</span><span class="hex">#9FDEEC</span></div>
    <div class="swatch" style="background:#C9ECF4;"><span class="name">200</span><span class="hex">#C9ECF4</span></div>
    <div class="swatch" style="background:#E5F6FA;"><span class="name">100</span><span class="hex">#E5F6FA</span></div>
  </div>
  <div class="label-row" style="margin-top:8px;">
    <span class="tag" style="color:var(--blue-700);">Action · Bright Blue</span>
    <span class="tag-spec">CTAs · links · pílulas ativas · #2563EB</span>
  </div>
  <div class="row">
    <div class="swatch" style="background:#1A3E96; color:#EBF1FE;"><span class="name">900</span><span class="hex">#1A3E96</span></div>
    <div class="swatch" style="background:#1F4DB8; color:#EBF1FE;"><span class="name">800</span><span class="hex">#1F4DB8</span></div>
    <div class="swatch" style="background:#2563EB; color:#EBF1FE; outline:2px solid #0D2747; outline-offset:-2px;"><span class="name">700 ◆</span><span class="hex">#2563EB</span></div>
    <div class="swatch" style="background:#4A7FF0; color:#EBF1FE;"><span class="name">600</span><span class="hex">#4A7FF0</span></div>
    <div class="swatch" style="background:#6B95F2;"><span class="name">500</span><span class="hex">#6B95F2</span></div>
    <div class="swatch" style="background:#B6CBFA;"><span class="name">300</span><span class="hex">#B6CBFA</span></div>
    <div class="swatch" style="background:#D6E1FD;"><span class="name">200</span><span class="hex">#D6E1FD</span></div>
    <div class="swatch" style="background:#EBF1FE;"><span class="name">100</span><span class="hex">#EBF1FE</span></div>
  </div>
</div>
</body>
</html>
