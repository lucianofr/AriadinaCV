<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Iconography</title>
<link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="card">
  <div class="label-row">
    <span class="tag">Iconografia · Lucide stroke 1.5</span>
    <span class="tag-spec">20px UI · currentColor</span>
  </div>
  <div style="display:grid; grid-template-columns: repeat(8, 1fr); gap:18px 12px; padding:6px 0; color:var(--navy-800);">
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="globe-2" style="width:24px;height:24px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">globe-2</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="target" style="width:24px;height:24px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">target</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="line-chart" style="width:24px;height:24px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">line-chart</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="trending-up" style="width:24px;height:24px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">trending-up</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="layers" style="width:24px;height:24px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">layers</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="building-2" style="width:24px;height:24px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">building-2</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="briefcase" style="width:24px;height:24px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">briefcase</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="file-text" style="width:24px;height:24px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">file-text</span></div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="calendar" style="width:24px;height:24px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">calendar</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="users" style="width:24px;height:24px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">users</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="check-circle-2" style="width:24px;height:24px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">check</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="alert-triangle" style="width:24px;height:24px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">alert</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="download" style="width:24px;height:24px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">download</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="arrow-right" style="width:24px;height:24px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">arrow-right</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="mail" style="width:24px;height:24px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">mail</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><i data-lucide="message-circle" style="width:24px;height:24px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">whatsapp</span></div>
  </div>
  <script>lucide.createIcons();</script>
</div>
</body>
</html>
