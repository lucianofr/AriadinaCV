<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>KPI tiles</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="label-row">
    <span class="tag">KPI tiles · dashboard</span>
    <span class="tag-spec">700 · 40px · mono delta</span>
  </div>
  <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px;">
    <div style="background:#FFF; border:1px solid var(--slate-200); border-radius:10px; padding:18px; box-shadow:var(--shadow-1);">
      <div style="font-family:var(--font-sans); font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:var(--fg-3); font-weight:600;">Orçamento monitorado</div>
      <div style="font-family:var(--font-display); font-size:36px; font-weight:700; color:var(--navy-800); letter-spacing:-0.025em; line-height:1; margin-top:10px;">R$ 612 mi</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--success); margin-top:6px;">▲ 4,2% vs período anterior</div>
    </div>
    <div style="background:#FFF; border:1px solid var(--slate-200); border-radius:10px; padding:18px; box-shadow:var(--shadow-1); border-top:3px solid var(--cyan-500);">
      <div style="font-family:var(--font-sans); font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:var(--fg-3); font-weight:600;">Indicadores no alvo</div>
      <div style="font-family:var(--font-display); font-size:36px; font-weight:700; color:var(--navy-800); letter-spacing:-0.025em; line-height:1; margin-top:10px;">42 <span style="color:var(--fg-3); font-size:22px; font-weight:500;">/ 48</span></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--danger); margin-top:6px;">▼ 2 críticos · atenção</div>
    </div>
    <div style="background:#FFF; border:1px solid var(--slate-200); border-radius:10px; padding:18px; box-shadow:var(--shadow-1);">
      <div style="font-family:var(--font-sans); font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:var(--fg-3); font-weight:600;">Ciclo de entrega</div>
      <div style="font-family:var(--font-display); font-size:36px; font-weight:700; color:var(--navy-800); letter-spacing:-0.025em; line-height:1; margin-top:10px;">−18%</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3); margin-top:6px;">vs baseline 2022</div>
    </div>
  </div>
</div>
</body>
</html>
