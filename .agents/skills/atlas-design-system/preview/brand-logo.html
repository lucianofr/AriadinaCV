<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Logo system</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="padding:0;">
  <div style="padding:24px 28px 0;">
    <div class="label-row">
      <span class="tag">Marca · globo + wordmark</span>
      <span class="tag-spec">mark · horizontal · stacked · wordmark</span>
    </div>
  </div>
  <div style="display:grid; grid-template-columns: 0.7fr 1.4fr 1fr 1fr; gap:0; margin-top:14px;">
    <div style="background:var(--slate-050); padding:32px; display:flex; align-items:center; justify-content:center; border-right:1px solid var(--slate-200);">
      <img src="../assets/logo-mark.svg" alt="" style="width:64px; height:64px;">
    </div>
    <div style="background:#FFF; padding:24px; display:flex; align-items:center; justify-content:center; border-right:1px solid var(--slate-200);">
      <img src="../assets/logo-aap.svg" alt="" style="height:60px;">
    </div>
    <div style="background:var(--slate-050); padding:20px; display:flex; align-items:center; justify-content:center; border-right:1px solid var(--slate-200);">
      <img src="../assets/logo-stacked.svg" alt="" style="height:140px;">
    </div>
    <div style="background:#FFF; padding:20px; display:flex; align-items:center; justify-content:center;">
      <img src="../assets/logo-wordmark.svg" alt="" style="height:24px;">
    </div>
  </div>
</div>
</body>
</html>
