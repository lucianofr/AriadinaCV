<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Navy scale</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="label-row">
    <span class="tag">Primary · Deep Navy</span>
    <span class="tag-spec">core: navy-800 · #0D2747</span>
  </div>
  <div class="row">
    <div class="swatch" style="background:#050D1C; color:#EEF2F8;"><span class="name">950</span><span class="hex">#050D1C</span></div>
    <div class="swatch" style="background:#081A33; color:#EEF2F8;"><span class="name">900</span><span class="hex">#081A33</span></div>
    <div class="swatch" style="background:#0D2747; color:#EEF2F8; outline:2px solid #3FB8D6; outline-offset:-2px;"><span class="name">800 ◆</span><span class="hex">#0D2747</span></div>
    <div class="swatch" style="background:#143560; color:#EEF2F8;"><span class="name">700</span><span class="hex">#143560</span></div>
    <div class="swatch" style="background:#1F4480; color:#EEF2F8;"><span class="name">600</span><span class="hex">#1F4480</span></div>
    <div class="swatch" style="background:#2E5BA0; color:#EEF2F8;"><span class="name">500</span><span class="hex">#2E5BA0</span></div>
    <div class="swatch" style="background:#4A7BC2; color:#EEF2F8;"><span class="name">400</span><span class="hex">#4A7BC2</span></div>
    <div class="swatch" style="background:#7C9FD4;"><span class="name">300</span><span class="hex">#7C9FD4</span></div>
    <div class="swatch" style="background:#B4C5E0;"><span class="name">200</span><span class="hex">#B4C5E0</span></div>
    <div class="swatch" style="background:#DCE5F1;"><span class="name">100</span><span class="hex">#DCE5F1</span></div>
    <div class="swatch" style="background:#EEF2F8;"><span class="name">050</span><span class="hex">#EEF2F8</span></div>
  </div>
  <p style="font-size:13px; color:var(--fg-3); margin:0;">
    Cor primária. Hero, contato e footer em 800. 900 para áreas mais densas. 050–200 para fundos claros e pílulas.
  </p>
</div>
</body>
</html>
