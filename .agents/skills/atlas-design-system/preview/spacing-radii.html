<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Radii</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="label-row">
    <span class="tag">Corner radius · moderno generoso</span>
    <span class="tag-spec">4 · 6 · 10 · 16 · 24 · pill</span>
  </div>
  <div style="display:flex; gap:24px; align-items:flex-end; flex-wrap:wrap;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div style="width:64px; height:64px; background:var(--navy-800); border-radius:4px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">4 · xs</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div style="width:64px; height:64px; background:var(--navy-800); border-radius:6px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">6 · sm · inputs</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div style="width:64px; height:64px; background:var(--navy-800); border-radius:10px; outline:2px solid var(--cyan-500); outline-offset:3px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--cyan-700); font-weight:600;">10 · md · default</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div style="width:64px; height:64px; background:var(--navy-800); border-radius:16px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">16 · lg · hero</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div style="width:64px; height:64px; background:var(--navy-800); border-radius:24px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">24 · xl</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div style="width:100px; height:36px; background:var(--blue-700); border-radius:999px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">pill · chips</div>
    </div>
  </div>
</div>
</body>
</html>
