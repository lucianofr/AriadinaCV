<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mono & numerics</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="label-row">
    <span class="tag">Mono &amp; KPI · JetBrains Mono</span>
    <span class="tag-spec">tabular-nums · 400/500</span>
  </div>
  <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px;">
    <div>
      <div style="font-family:var(--font-sans); font-size:11px; color:var(--fg-3); text-transform:uppercase; letter-spacing:0.12em; font-weight:600;">Orçamento</div>
      <div class="kpi-num">R$ 612 mi</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--success); margin-top:4px;">▲ 4,2% vs LY</div>
    </div>
    <div>
      <div style="font-family:var(--font-sans); font-size:11px; color:var(--fg-3); text-transform:uppercase; letter-spacing:0.12em; font-weight:600;">Indicadores</div>
      <div class="kpi-num">42 / 48</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--danger); margin-top:4px;">▼ 2 críticos</div>
    </div>
    <div>
      <div style="font-family:var(--font-sans); font-size:11px; color:var(--fg-3); text-transform:uppercase; letter-spacing:0.12em; font-weight:600;">Ciclo médio</div>
      <div class="kpi-num">−18%</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3); margin-top:4px;">vs baseline 2022</div>
    </div>
  </div>
  <div class="divider"></div>
  <code style="font-family:var(--font-mono); font-size:13px; color:var(--fg-2);">ID-PRG-2023-ES-014 · TCE/ES · BID-LOAN-5142</code>
</div>
</body>
</html>
