<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Elevation</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="background:var(--slate-050);">
  <div class="label-row">
    <span class="tag">Elevation · sombras frias slate</span>
    <span class="tag-spec">3 níveis + glow ciano</span>
  </div>
  <div style="display:flex; gap:24px; align-items:center; padding:24px 8px 8px; flex-wrap:wrap;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:14px;">
      <div style="width:130px; height:80px; background:#FFF; border-radius:10px; border:1px solid var(--border-soft); box-shadow:var(--shadow-1);"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">shadow-1 · cards</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:14px;">
      <div style="width:130px; height:80px; background:#FFF; border-radius:10px; border:1px solid var(--border-soft); box-shadow:var(--shadow-2);"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">shadow-2 · hover</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:14px;">
      <div style="width:130px; height:80px; background:#FFF; border-radius:10px; border:1px solid var(--border-soft); box-shadow:var(--shadow-3);"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">shadow-3 · modal</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:14px;">
      <div style="width:130px; height:80px; background:#FFF; border-radius:10px; border:1px solid var(--cyan-300); box-shadow:var(--shadow-glow);"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--cyan-700); font-weight:600;">glow · destaque</div>
    </div>
  </div>
</div>
</body>
</html>
